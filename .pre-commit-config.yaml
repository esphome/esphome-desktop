# Install with: pre-commit install
#
# Base hooks mirror the esphome/device-builder-frontend config. The local cargo
# hooks mirror the required Rust gates in the `Lint & Test` CI workflow
# (.github/workflows/lint-test.yml). PR #134 made clippy and rustfmt blocking
# gates for the src-tauri crate; these hooks catch the same failures before a
# commit instead of after CI runs.
#
# CI pins Rust to a fixed toolchain (see `toolchain:` in lint-test.yml) so a new
# release can't introduce a fresh lint on an unrelated PR. The cargo hooks use
# your default toolchain; if a result differs locally, match the pinned version.

# pre-commit.ci runs in a sandbox without a Rust toolchain, so the local cargo
# hooks fail there with "cargo: command not found". They are already enforced
# by the `Lint & Test` GitHub Actions workflow, so skip them on pre-commit.ci;
# they still run locally on commit and via `pre-commit run`.
ci:
  skip:
    - cargo-fmt
    - cargo-clippy

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
      - id: check-json
      - id: mixed-line-ending
        args: [--fix=lf]
  # Lint and format first-party Python (release tooling + the embedded
  # device-builder maintenance helper). Pinned to match the Scripts Test CI job.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: [--check]
  - repo: local
    hooks:
      - id: forbid-nul-bytes
        name: forbid NUL bytes in source files
        language: pygrep
        entry: "\\x00"
        types: [text]

      # Mirrors the "File size cap" gate in lint-test.yml. Unlike the cargo
      # hooks below this is pure Python with no toolchain to find, so it is
      # absent from the `ci: skip` list above and runs on pre-commit.ci too.
      # The script enumerates its own files with `git ls-files`, so it takes
      # no filenames.
      #
      # always_run rather than `types: [rust]`, to mirror lint-test.yml, which
      # has no paths filter and so gates every PR. pre-commit builds its file
      # list from staged adds and modifies and drops deletions, so a commit
      # that only *deletes* a .rs file stages no Rust file and would skip the
      # hook — and that is exactly the commit that strands an EXEMPT entry.
      # Editing the script or its list would not trigger it either. It is a
      # whole-tree check that reads no filenames, so there is nothing to gain
      # by scoping it.
      #
      # `language: python` rather than `system`, so pre-commit provisions the
      # interpreter and `python` resolves inside its venv on every platform. A
      # python.org install on Windows puts `python.exe` and `py.exe` on PATH
      # but no `python3.exe`; only the Microsoft Store build ships that shim.
      # Under `system` the entry comes straight off PATH, so `python3` would
      # fail to launch there — and because this hook is always_run, it would
      # fail every commit, not just the ones touching Rust.
      - id: check-file-size
        name: file size cap (src-tauri/src)
        entry: python .github/scripts/check_file_size.py
        language: python
        always_run: true
        pass_filenames: false

      # Run inside src-tauri so rustup discovers src-tauri/rust-toolchain.toml
      # and resolves the same pinned toolchain CI uses (requires git-bash on
      # Windows).
      - id: cargo-fmt
        name: cargo fmt (src-tauri)
        entry: bash -c 'cd src-tauri && cargo fmt --all --check'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy (src-tauri)
        entry: bash -c 'cd src-tauri && cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        types: [rust]
        pass_filenames: false
