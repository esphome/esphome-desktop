name: Build Linux

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # TEMPORARY WORKAROUND:
      # SOURCE: https://github.com/music-assistant/desktop-app/blob/main/.github/workflows/build-release.yml
      # Use a custom tauri-cli branch to enable the new "truly portable" AppImage format.
      # This relies on TAURI_BUNDLER_NEW_APPIMAGE_FORMAT=true and can be removed once
      # https://github.com/tauri-apps/tauri/pull/12491 is merged and released upstream.
      - name: Install Tauri CLI (custom branch for portable AppImage)
        run: |
          # Use custom tauri-cli branch with truly portable AppImage format
          # This avoids linuxdeploy issues with vendored Python libraries
          cargo install tauri-cli --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage --locked --force

      - name: Prepare Python bundle
        run: ./build-scripts/prepare_bundle.sh linux-x64

      - name: Build
        run: cargo tauri build --verbose
        env:
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
