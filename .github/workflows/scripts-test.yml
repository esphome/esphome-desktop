name: Scripts Test

# Lint and unit tests for the repo's first-party Python: the release tooling
# under .github/scripts/, the runtime helpers under src-tauri/scripts/ that the
# Rust binary embeds via include_str!, and the build-time generators under
# build-scripts/. The release manifest generator drives in-app self-updates and
# device_builder_maintenance.py heals the bundled install (#190); a bug in
# either ships to every user, and the main Build workflow only *runs* them
# during a release, so this job gates the logic on every relevant PR.

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/scripts/**"
      - ".github/workflows/scripts-test.yml"
      - "build-scripts/**"
      - "src-tauri/scripts/**"
      - "tests/**"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Python lint (ruff)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      # Pin ruff exactly: its lint rules and formatter output can change between
      # releases, so an unpinned upgrade could fail this gate on an unrelated PR
      # (same reasoning the repo pins the Rust toolchain).
      - name: Install ruff
        run: python -m pip install 'ruff==0.15.13'

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Python scripts test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # The device-builder maintenance helper depends on importlib.metadata
        # behavior and filesystem semantics that differ by OS (the #190 loop
        # manifested on Windows), so exercise every platform we ship. We bundle
        # CPython 3.13, so that is the only version worth testing.
        os: [ubuntu-22.04, macos-15, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      # Pin to a major so a breaking/yanked pytest release can't fail this gate
      # on unrelated PRs (same reasoning the repo pins the Rust toolchain).
      - name: Install pytest
        run: python -m pip install 'pytest~=8.0'

      - name: Run script tests
        run: python -m pytest tests/ -v
