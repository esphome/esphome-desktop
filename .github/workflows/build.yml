name: Build

concurrency:
  # For workflow_run events (release builds), use a fixed group so new runs cancel
  # in-flight ones. For PR/dispatch events, use the ref for per-branch concurrency.
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && 'release' || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  workflow_run:
    workflows: ["Release Drafter"]
    types: [completed]
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    # Only run release builds when the Release Drafter workflow succeeded.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - platform: windows
            os: windows-latest
            target: windows-x64
            bundles: nsis
            updater_target: windows-x86_64
          - platform: linux
            os: ubuntu-22.04
            target: linux-x64
            bundles: appimage
            # Pinned commit of tauri-apps/tauri feat/truly-portable-appimage.
            tauri_rev: 105550cf9986a1a752eafb288baa562d6a564cce
            updater_target: linux-x86_64
          - platform: linux
            os: ubuntu-22.04
            target: linux-x64
            bundles: deb,rpm
          - platform: linux
            os: ubuntu-22.04-arm
            target: linux-arm64
            bundles: appimage
            # Pinned commit of tauri-apps/tauri feat/truly-portable-appimage.
            tauri_rev: 105550cf9986a1a752eafb288baa562d6a564cce
            updater_target: linux-aarch64
          - platform: linux
            os: ubuntu-22.04-arm
            target: linux-arm64
            bundles: deb,rpm
          - platform: macos
            os: macos-15
            target: macos-arm64
            rust_target: aarch64-apple-darwin
            bundles: dmg
            updater_target: darwin-aarch64
          - platform: macos
            os: macos-15
            target: macos-x64
            rust_target: x86_64-apple-darwin
            bundles: dmg
            updater_target: darwin-x86_64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # For workflow_run events, check out the commit that triggered the
          # Release Drafter workflow (the latest push to main).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      # Linux-specific dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}
          # Workaround for Swatinem/rust-cache#341 — caching ~/.cargo/bin
          # produces broken cargo/rustc symlinks on the new macOS runner image.
          cache-bin: false

      # Resolve a tauri-cli version from the locked `tauri` crate version so it
      # tracks Dependabot's cargo bumps automatically (no hardcoded version to go
      # stale). Used for the prebuilt install on the stock jobs below. The
      # AppImage jobs build a pinned fork instead, so they skip this.
      - name: Resolve Tauri CLI version
        if: ${{ !matrix.tauri_rev }}
        shell: bash
        run: |
          set -euo pipefail
          ver=$(awk '/^name = "tauri"$/{getline; print}' src-tauri/Cargo.lock \
            | sed -E 's/version = "(.+)"/\1/' | head -1)
          # Validate against a strict version charset before trusting it: the
          # value comes from a PR-editable Cargo.lock, so reject anything with
          # shell metacharacters / quotes / newlines (defends the $GITHUB_ENV
          # write and every later use).
          if [[ ! "$ver" =~ ^[0-9][0-9A-Za-z.+-]*$ ]]; then
            echo "::error::unexpected tauri version from src-tauri/Cargo.lock: '$ver'"
            exit 1
          fi
          echo "TAURI_CLI_VERSION=$ver" >> "$GITHUB_ENV"
          echo "Resolved tauri-cli version: $ver"

      # Stock jobs install a prebuilt cargo-tauri via cargo-binstall (seconds)
      # rather than compiling tauri-cli from source, which dominated the per-job
      # time at 5-10 min. No cache is involved, so this is immune to the cache
      # eviction that makes a small per-binary cache unreliable at the repo's
      # 10 GB cache cap. binstall only falls back to compiling if a platform has
      # no prebuilt (e.g. aarch64 Linux).
      - name: Install cargo-binstall
        if: ${{ !matrix.tauri_rev }}
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      # Version reaches the script only through env, never via ${{ }}
      # interpolation into the run block, so a crafted Cargo.lock cannot inject
      # shell commands. GITHUB_TOKEN lets binstall query GitHub releases without
      # hitting the anonymous rate limit.
      - name: Install Tauri CLI (prebuilt)
        if: ${{ !matrix.tauri_rev }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo binstall --no-confirm \
            --strategies crate-meta-data,quick-install,compile \
            tauri-cli --version "$TAURI_CLI_VERSION"

      # The AppImage jobs build tauri-cli from a pinned upstream fork (the
      # "truly portable AppImage" format, tauri-apps/tauri#12491, not yet
      # released), so there is no prebuilt to binstall. Cache the single compiled
      # binary, keyed on the fork commit, so only the first run per commit pays
      # the ~5 min compile. Caching just the binary (not all of ~/.cargo/bin)
      # sidesteps the broken symlink restore behind Swatinem/rust-cache#341. Only
      # two such caches exist (one per arch), so eviction pressure is minimal.
      - name: Cache Tauri CLI (AppImage fork)
        id: tauri-cli-cache
        if: ${{ matrix.tauri_rev }}
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cargo/bin/cargo-tauri*
          key: tauri-cli-${{ runner.os }}-${{ runner.arch }}-${{ matrix.tauri_rev }}

      # TAURI_REV is a workflow-defined SHA, passed through env for consistency.
      - name: Build Tauri CLI from fork (AppImage)
        if: ${{ matrix.tauri_rev && steps.tauri-cli-cache.outputs.cache-hit != 'true' }}
        shell: bash
        env:
          TAURI_REV: ${{ matrix.tauri_rev }}
        run: cargo install tauri-cli --git https://github.com/tauri-apps/tauri --rev "$TAURI_REV" --locked

      - name: Prepare Python bundle
        shell: bash
        run: ./build-scripts/prepare_bundle.sh ${{ matrix.target }}

      # macOS-specific signing setup
      - name: Import Apple certificate
        if: matrix.platform == 'macos' && github.event_name == 'workflow_run'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERT_FILE
          security create-keychain -p "${{ github.run_id }}" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "${{ github.run_id }}" $KEYCHAIN_PATH
          security import $CERT_FILE -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "${{ github.run_id }}" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Sign Python bundle binaries
        if: matrix.platform == 'macos' && github.event_name == 'workflow_run'
        run: ./build-scripts/sign_python_bundle.sh
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

      # The Tauri AppImage fork downloads quick-sharun.sh from upstream main and
      # runs it during the build. Its strace step backgrounds each traced binary
      # and kills it via `set -m` job control, which silently no-ops on tty-less
      # CI runners, so webkit2gtk's MiniBrowser never dies and the build hangs
      # until timeout (pkgforge-dev/Anylinux-AppImages regression, late June).
      # Pre-stage a copy pinned to a known commit, patched to bound each trace
      # with `timeout` instead, so the bundler reuses ours (it only downloads
      # when the file is absent).
      - name: Stage patched quick-sharun (AppImage strace hang fix)
        if: contains(matrix.bundles, 'appimage')
        run: ./build-scripts/stage_quick_sharun.sh

      # Build step - Linux with special env var
      - name: Build (Linux CI)
        if: matrix.platform == 'linux' && github.event_name != 'workflow_run'
        run: cargo tauri build --verbose --bundles ${{ matrix.bundles }}
        env:
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true

      - name: Build (Linux Release)
        if: matrix.platform == 'linux' && github.event_name == 'workflow_run'
        shell: bash
        run: |
          extra_args=""
          if [[ -n "${{ matrix.updater_target || '' }}" ]]; then
            extra_args="--config src-tauri/tauri.release.conf.json"
          fi
          cargo tauri build --verbose --bundles ${{ matrix.bundles }} $extra_args
        env:
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Build step - Windows CI
      - name: Build (Windows CI)
        if: matrix.platform == 'windows' && github.event_name != 'workflow_run'
        run: cargo tauri build

      - name: Build (Windows Release with signing)
        if: matrix.platform == 'windows' && github.event_name == 'workflow_run'
        run: cargo tauri build --config src-tauri/tauri.release.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Build step - macOS CI
      - name: Build (macOS CI)
        if: matrix.platform == 'macos' && github.event_name != 'workflow_run'
        run: ./build-scripts/macos_build_retry.sh ${{ matrix.rust_target && format('--target {0}', matrix.rust_target) || '' }}

      - name: Build (macOS Release with signing)
        if: matrix.platform == 'macos' && github.event_name == 'workflow_run'
        run: ./build-scripts/macos_build_retry.sh ${{ matrix.rust_target && format('--target {0}', matrix.rust_target) || '' }} --config src-tauri/tauri.release.conf.json
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # The sharun-based AppImage format uses DwarFS and does not include Tauri
      # resources. The build leaves the AppDir intact, so we inject Python into
      # it and repack with mkdwarfs + the uruntime header.
      - name: Inject Python into AppImage
        if: contains(matrix.bundles, 'appimage')
        run: |
          set -euo pipefail

          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          APPDIR="src-tauri/target/release/bundle/appimage/ESPHome Device Builder.AppDir"
          echo "Found AppImage: $APPIMAGE"
          echo "AppDir: $APPDIR"

          # Copy Python bundle into the resource directory that
          # get_bundled_resource_dir() resolves on Linux: exe_dir/../lib/esphome-desktop/
          # The binary lives at bin/esphome-desktop, so this becomes lib/esphome-desktop/.
          RESOURCE_DIR="$APPDIR/lib/esphome-desktop"
          mkdir -p "$RESOURCE_DIR"
          cp -r src-tauri/python "$RESOURCE_DIR/python"

          # Extract the uruntime header from the existing AppImage
          chmod +x "$APPIMAGE"
          OFFSET=$("$APPIMAGE" --appimage-offset)
          dd if="$APPIMAGE" of=runtime.bin bs="$OFFSET" count=1

          # Download mkdwarfs (same version used by quick-sharun.sh). The
          # release asset name uses uname -m verbatim (x86_64 / aarch64).
          # mkdwarfs repacks the AppImage shipped to every Linux user, so a
          # tampered or truncated download would corrupt the published artifact.
          # The dwarfs project publishes no SHA256SUMS asset, so pin the known
          # hash per arch and verify before trusting the binary. --fail stops a
          # saved HTTP error page; --retry rides out transient network blips.
          DWARFS_VERSION="0.14.1"
          DWARFS_ARCH=$(uname -m)
          case "$DWARFS_ARCH" in
            x86_64)  DWARFS_SHA256="f3a117fd6d5b7304944b199af7fdb8086a48c509ea2e9832255d8f9a54c98587" ;;
            aarch64) DWARFS_SHA256="3a47eda6d496ba12fb6d9af1b1914d4ba7ab73df8df3172ee3cad66c29822cc1" ;;
            *) echo "::error::no pinned mkdwarfs SHA256 for arch '$DWARFS_ARCH'"; exit 1 ;;
          esac
          DWARFS_ASSET="dwarfs-universal-${DWARFS_VERSION}-Linux-${DWARFS_ARCH}"
          DWARFS_URL="https://github.com/mhx/dwarfs/releases/download/v${DWARFS_VERSION}/${DWARFS_ASSET}"
          curl -fL --retry 3 --retry-delay 2 -o mkdwarfs "$DWARFS_URL"
          echo "${DWARFS_SHA256}  mkdwarfs" | sha256sum -c -

          # Cross-check against the sha256 digest GitHub records for the release
          # asset. This is defense in depth on top of the
          # inline pin: it catches a stale pin after a version bump, while the
          # pin still guards against a compromised asset (the API would report
          # the bad asset's digest, so it can't replace the pin). Older releases
          # may predate GitHub's asset-digest feature, so a missing digest only
          # warns rather than failing the build. The pin already verified the
          # binary above, so a transient API failure must not red an
          # already-correct build: --retry rides out blips and the trailing
          # `|| true` degrades a hard failure to the no-digest warning branch.
          API_DIGEST=$(curl -fsSL --retry 3 --retry-delay 2 \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/mhx/dwarfs/releases/tags/v${DWARFS_VERSION}" \
            | jq -r --arg name "$DWARFS_ASSET" \
                '.assets[] | select(.name == $name) | .digest // empty' || true)
          if [ -n "$API_DIGEST" ]; then
            echo "${API_DIGEST#sha256:}  mkdwarfs" | sha256sum -c -
            echo "Verified mkdwarfs against GitHub API digest: $API_DIGEST"
          else
            echo "::warning::GitHub API reported no digest for ${DWARFS_ASSET}; relying on pinned SHA256"
          fi
          chmod +x mkdwarfs

          # Repack: create DwarFS image from the AppDir and combine with runtime
          ./mkdwarfs -i "$APPDIR" -o new.dwarfs --no-history -l7
          cat runtime.bin new.dwarfs > "$APPIMAGE"
          chmod +x "$APPIMAGE"

          # Show the result
          echo "AppImage size: $(du -sh "$APPIMAGE" | cut -f1)"

          # Clean up
          rm -f runtime.bin new.dwarfs mkdwarfs

      # The .AppImage.sig produced by `cargo tauri build` was signed before the
      # Python bundle was injected and the file repacked, so it's stale. Re-sign
      # the final AppImage so the Tauri updater can verify it.
      - name: Re-sign AppImage for updater
        if: contains(matrix.bundles, 'appimage') && github.event_name == 'workflow_run'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cargo tauri signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$APPIMAGE"
          echo "Signed: $APPIMAGE"
          ls -la "${APPIMAGE}.sig"

      # The macOS updater format is .app.tar.gz, which Tauri names after the
      # product (no version or arch). Rename per-arch so the two macOS jobs'
      # uploads don't collide on the release.
      - name: Stage macOS updater artifact
        if: matrix.platform == 'macos' && github.event_name == 'workflow_run'
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/${{ matrix.rust_target && format('{0}/', matrix.rust_target) || '' }}release/bundle/macos"
          arch="${{ matrix.target == 'macos-arm64' && 'aarch64' || 'x64' }}"
          shopt -s nullglob
          for f in "$bundle_dir"/*.app.tar.gz; do
            base="$(basename "$f" .app.tar.gz)"
            new="$bundle_dir/${base}_${arch}.app.tar.gz"
            mv "$f" "$new"
            if [[ -f "${f}.sig" ]]; then
              mv "${f}.sig" "${new}.sig"
            fi
            echo "Staged: $new"
          done

      # Upload artifacts
      - name: Upload NSIS
        if: contains(matrix.bundles, 'nsis')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: src-tauri/target/release/bundle/nsis/*.exe
          archive: false

      - name: Upload NSIS updater signature
        if: contains(matrix.bundles, 'nsis') && github.event_name == 'workflow_run'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: src-tauri/target/release/bundle/nsis/*.exe.sig
          archive: false

      - name: Upload AppImage
        if: contains(matrix.bundles, 'appimage')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          archive: false

      - name: Upload AppImage updater signature
        if: contains(matrix.bundles, 'appimage') && github.event_name == 'workflow_run'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: src-tauri/target/release/bundle/appimage/*.AppImage.sig
          archive: false

      - name: Upload deb
        if: contains(matrix.bundles, 'deb')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: src-tauri/target/release/bundle/deb/*.deb
          archive: false

      - name: Upload RPM
        if: contains(matrix.bundles, 'rpm')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: src-tauri/target/release/bundle/rpm/*.rpm
          archive: false

      - name: Upload DMG
        if: contains(matrix.bundles, 'dmg')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: src-tauri/target/${{ matrix.rust_target && format('{0}/', matrix.rust_target) || '' }}release/bundle/dmg/*.dmg
          archive: false

      - name: Upload macOS updater bundle
        if: matrix.platform == 'macos' && github.event_name == 'workflow_run'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: src-tauri/target/${{ matrix.rust_target && format('{0}/', matrix.rust_target) || '' }}release/bundle/macos/*.app.tar.gz
          archive: false

      - name: Upload macOS updater signature
        if: matrix.platform == 'macos' && github.event_name == 'workflow_run'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: src-tauri/target/${{ matrix.rust_target && format('{0}/', matrix.rust_target) || '' }}release/bundle/macos/*.app.tar.gz.sig
          archive: false

  # Persist PR metadata so the companion "PR Comment" workflow (which runs
  # in the base-repo context via workflow_run, granting write access to fork
  # PRs too) knows which PR to comment on. JSON so we can add more fields
  # later without changing the file format.
  pr-info:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions: {}
    steps:
      - name: Write PR info
        run: |
          cat > pr-info.json <<EOF
          {
            "pr_number": ${{ github.event.pull_request.number }}
          }
          EOF
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: pr-info.json
          archive: false

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need the latest.json generator script + the JSON Schema it produces;
          # nothing else from the source tree is required by the release job.
          sparse-checkout: |
            .github/latest.schema.json
            .github/scripts
          sparse-checkout-cone-mode: false

      - name: Find draft release
        id: find-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Find the most recent draft release
          release_json=$(gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.draft == true)] | first')
          if [[ -z "$release_json" || "$release_json" == "null" ]]; then
            echo "::error::No draft release found"
            exit 1
          fi
          release_id=$(echo "$release_json" | jq -r '.id')
          tag_name=$(echo "$release_json" | jq -r '.tag_name')
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "Found draft release: $tag_name (ID: $release_id)"

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Delete existing assets from draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_id="${{ steps.find-release.outputs.release_id }}"
          # When the version/tag changes (e.g. from a patch to minor bump),
          # filenames change too, leaving stale assets behind. Delete all
          # existing assets so we only have the current build's files.
          asset_ids=$(gh api "repos/${{ github.repository }}/releases/${release_id}/assets" \
            --jq '.[].id')
          for id in $asset_ids; do
            echo "Deleting asset $id"
            gh api "repos/${{ github.repository }}/releases/assets/${id}" --method DELETE --silent
          done

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.find-release.outputs.tag_name }}"
          find artifacts -type f -print0 | while IFS= read -r -d '' file; do
            echo "Uploading: $file"
            gh release upload "$tag" "$file" --repo "${{ github.repository }}" --clobber
          done

      # Build latest.json from the per-platform .sig files now attached to
      # the draft release. See .github/scripts/generate_latest_json.py for
      # the full manifest shape and the rationale around the `downloads`
      # section (formats the Tauri updater doesn't ship — .deb, .rpm, .dmg)
      # and the desktop.esphome.io schema reference.
      - name: Generate latest.json for updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.find-release.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/generate_latest_json.py

      - name: Validate latest.json against schema
        run: |
          set -euo pipefail
          pip install --quiet check-jsonschema
          check-jsonschema --schemafile .github/latest.schema.json latest.json

      - name: Upload latest.json to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.find-release.outputs.tag_name }}"
          gh release upload "$tag" latest.json --repo "${{ github.repository }}" --clobber

      - name: Remove assets-pending warning from release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_id="${{ steps.find-release.outputs.release_id }}"
          # Fetch current release body
          body=$(gh api "repos/${{ github.repository }}/releases/${release_id}" --jq '.body')
          # Remove the warning block (everything from the caution block through the ASSETS_PENDING marker), if present
          new_body=$(echo "$body" | sed '/^> \[!CAUTION\]/,/<!-- ASSETS_PENDING -->/d')
          # Ensure any remaining ASSETS_PENDING markers are removed even if the caution block was edited/removed
          new_body=$(echo "$new_body" | sed 's/<!-- ASSETS_PENDING -->//g')
          # Remove any leading blank lines left behind
          new_body=$(echo "$new_body" | sed '/./,$!d')
          # Only update the release body if it has actually changed, keeping it as a draft
          if [ "$new_body" != "$body" ]; then
            gh api "repos/${{ github.repository }}/releases/${release_id}" \
              --method PATCH \
              --field "tag_name=${{ steps.find-release.outputs.tag_name }}" \
              --field "body=${new_body}" \
              --field "draft=true" \
              --silent
          fi
