name: AUR

on:
  pull_request:
    paths:
      - "packaging/aur/**"
      - ".github/workflows/publish-aur.yml"
  release:
    types: [published]

permissions: {}

jobs:
  generate:
    name: Generate PKGBUILD
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get version
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download deb and calculate checksum
        if: github.event_name == 'release'
        id: checksum
        run: |
          DEB_URL="https://github.com/esphome/esphome-desktop/releases/download/v${{ steps.release.outputs.version }}/ESPHome.Device.Builder_${{ steps.release.outputs.version }}_amd64.deb"
          # --fail: exit non-zero on HTTP >=400 instead of saving the error page.
          # Without it, a release-timing 404 (asset not yet uploaded) would be
          # hashed and the bogus checksum pushed to AUR, breaking every install.
          # --retry-all-errors: plain --retry skips HTTP 404s, but the asset-not-
          # yet-uploaded race returns exactly a 404, so retry those too.
          curl --fail --show-error --location --retry 3 --retry-delay 5 --retry-all-errors \
            -o /tmp/package.deb "$DEB_URL"
          # Sanity-check the payload really is a Debian package (ar archive magic)
          # before trusting its checksum. The full magic is 8 bytes: "!<arch>\n".
          if [ "$(head -c 8 /tmp/package.deb)" != "$(printf '!<arch>\n')" ]; then
            echo "::error::Downloaded file is not a valid .deb (missing ar archive magic)"
            exit 1
          fi
          SHA256SUM=$(sha256sum /tmp/package.deb | awk '{print $1}')
          echo "sha256=$SHA256SUM" >> $GITHUB_OUTPUT

      - name: Prepare PKGBUILD
        run: |
          mkdir -p aur-pkg
          if [ "${{ github.event_name }}" = "release" ]; then
            sed "s|sha256sums=('SKIP')|sha256sums=('${{ steps.checksum.outputs.sha256 }}')|g" \
                packaging/aur/esphome-desktop-bin/PKGBUILD > aur-pkg/PKGBUILD
          else
            cp packaging/aur/esphome-desktop-bin/PKGBUILD aur-pkg/PKGBUILD
          fi

      - name: Generate .SRCINFO
        uses: docker://archlinux:base
        with:
          entrypoint: sh
          args: |
            -c "
            pacman -Sy --noconfirm binutils fakeroot &&
            useradd -m builder &&
            chown -R builder:builder aur-pkg &&
            cd aur-pkg &&
            su builder -c 'makepkg --printsrcinfo' > .SRCINFO
            "

      - name: Print generated files
        run: |
          echo "=== PKGBUILD ==="
          cat aur-pkg/PKGBUILD
          echo ""
          echo "=== .SRCINFO ==="
          cat aur-pkg/.SRCINFO

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aur-pkg
          include-hidden-files: true
          path: |
            aur-pkg/PKGBUILD
            aur-pkg/.SRCINFO

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: generate
    if: github.event_name == 'release'
    environment: aur

    steps:
      - name: Get version
        id: release
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aur-pkg
          path: aur-pkg

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts

          git config --global user.name "esphomebot"
          git config --global user.email "esphome@openhomefoundation.org"

      - name: Clone AUR repository
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git clone ssh://aur@aur.archlinux.org/esphome-desktop-bin.git aur-publish

      - name: Commit and push to AUR
        working-directory: aur-publish
        run: |
          cp ../aur-pkg/PKGBUILD PKGBUILD
          cp ../aur-pkg/.SRCINFO .SRCINFO
          git add PKGBUILD .SRCINFO
          git commit -m "Update to version ${{ steps.release.outputs.version }}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur" git push origin master

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/aur
