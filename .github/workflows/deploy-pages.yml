name: Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Determine latest release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -n "${EVENT_TAG}" ]; then
            tag="${EVENT_TAG}"
          else
            if ! tag=$(gh release view --repo "${{ github.repository }}" --json tagName --jq .tagName); then
              echo "::error::Could not determine latest release tag."
              exit 1
            fi
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building page for $tag (version $version)"

      - name: Build site
        env:
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p _site
          # envsubst only substitutes the listed variables; any other $VAR
          # references in the template (e.g. $USER in shell snippets) are
          # left alone.
          envsubst '$VERSION $TAG' < web/index.html > _site/index.html
          cp src-tauri/icons/128x128.png _site/icon.png

      # Mirror the release manifest to the Pages site so consumers (download
      # pages, integrations, etc.) can fetch a stable
      # https://desktop.esphome.io/latest.json without hitting the GitHub
      # releases API. The schema is published alongside it so the manifest's
      # `$schema` reference resolves on the same domain.
      - name: Mirror latest.json + schema to site
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern latest.json --dir _site --clobber
          cp .github/latest.schema.json _site/latest.schema.json

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
