name: Release Drafter

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  release-drafter:
    runs-on: ubuntu-latest
    environment: release-drafter
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ESPHOME_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.ESPHOME_GITHUB_APP_PRIVATE_KEY }}

      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        id: release-draft
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      # Update version numbers in Cargo.toml and tauri.conf.json
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Calculate version
        id: version
        run: |
          tag="${{ steps.release-draft.outputs.tag_name }}"
          echo "version=${tag:1}" >> $GITHUB_OUTPUT

      # One table-driven step rewrites every version-bearing file; adding a
      # file is one line in the script's table instead of another sed step.
      - name: Set versions
        run: |
          python3 .github/scripts/set_version.py "${{ steps.version.outputs.version }}"

      - name: Update Cargo.lock
        run: |
          cd src-tauri
          cargo update --workspace

      # Commit via the GraphQL API so the commit is signed/verified as the GitHub App.
      - name: Commit changes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const changed = execSync('git diff --name-only', { encoding: 'utf8' })
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);

            if (changed.length === 0) {
              core.info('No changes to commit.');
              return;
            }

            const additions = changed.map(path => ({
              path,
              contents: fs.readFileSync(path).toString('base64'),
            }));

            const expectedHeadOid = execSync('git rev-parse HEAD', { encoding: 'utf8' }).trim();
            const branchName = context.ref.replace(/^refs\/heads\//, '');

            const result = await github.graphql(`
              mutation($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit { oid url }
                }
              }
            `, {
              input: {
                branch: {
                  repositoryNameWithOwner: `${context.repo.owner}/${context.repo.repo}`,
                  branchName,
                },
                message: { headline: `Bump version to ${process.env.VERSION}` },
                expectedHeadOid,
                fileChanges: { additions },
              },
            });

            core.info(`Created signed commit ${result.createCommitOnBranch.commit.oid}`);
            core.info(result.createCommitOnBranch.commit.url);
