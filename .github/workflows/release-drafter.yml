name: Release Drafter

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  release-drafter:
    runs-on: ubuntu-latest
    environment: release-drafter
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.ESPHOME_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.ESPHOME_GITHUB_APP_PRIVATE_KEY }}

      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        id: release-draft
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      # Update version numbers in Cargo.toml and tauri.conf.json
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Calculate version
        id: version
        run: |
          tag="${{ steps.release-draft.outputs.tag_name }}"
          echo "version=${tag:1}" >> $GITHUB_OUTPUT

      - name: Set Cargo.toml version
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/g" src-tauri/Cargo.toml

      - name: Set tauri.conf.json version
        run: |
          sed -i "s/\"version\": .*/\"version\": \"${{ steps.version.outputs.version }}\",/g" src-tauri/tauri.conf.json

      - name: Set PKGBUILD versions
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/g" packaging/aur/esphome-desktop-bin/PKGBUILD

      - name: Update Cargo.lock
        run: |
          cd src-tauri
          cargo update --workspace

      # Commit via the GraphQL API so the commit is signed/verified as the GitHub App.
      - name: Commit changes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const changed = execSync('git diff --name-only', { encoding: 'utf8' })
              .split('\n')
              .map(s => s.trim())
              .filter(Boolean);

            if (changed.length === 0) {
              core.info('No changes to commit.');
              return;
            }

            const additions = changed.map(path => ({
              path,
              contents: fs.readFileSync(path).toString('base64'),
            }));

            const expectedHeadOid = execSync('git rev-parse HEAD', { encoding: 'utf8' }).trim();
            const branchName = context.ref.replace(/^refs\/heads\//, '');

            const result = await github.graphql(`
              mutation($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit { oid url }
                }
              }
            `, {
              input: {
                branch: {
                  repositoryNameWithOwner: `${context.repo.owner}/${context.repo.repo}`,
                  branchName,
                },
                message: { headline: `Bump version to ${process.env.VERSION}` },
                expectedHeadOid,
                fileChanges: { additions },
              },
            });

            core.info(`Created signed commit ${result.createCommitOnBranch.commit.oid}`);
            core.info(result.createCommitOnBranch.commit.url);
