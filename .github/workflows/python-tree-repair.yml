name: Python Tree Repair

# End-to-end test for the bundled-Python package reset (#330).
#
# The reset deletes files out of a real Python tree and reinstalls them, so the
# cost of getting it wrong is a user left with no working ESPHome, or with a pip
# that can no longer install anything. The unit tests cover the logic against
# fabricated trees; this job runs it against the genuine article — the tree
# `prepare_bundle.sh` produces and we actually ship — on every OS we ship it on.
#
# What it proves, in one pass: a freshly built bundle is healthy; an orphaned
# component directory (exactly what the removed `--ignore-installed` fallback
# left behind, and what broke every compile on 2026.7) fails the health probe;
# the reset removes it; pip survives; and a reinstall brings the tree back.
#
# A venv would be cheaper but would not do: on Windows a venv puts python.exe in
# Scripts\ while the real bundle has it at the tree root, so the layout the reset
# resolves paths against would go untested on the platform the bug was reported
# on.
#
# Not folded into Lint & Test because it downloads a python-build-standalone
# tarball and pip-installs esphome on three runners, which is minutes rather than
# seconds; it is gated on the paths that can actually break it.

on:
  pull_request:
    branches: [main]
    paths:
      - "build-scripts/**"
      - "src-tauri/src/platform/**"
      - "src-tauri/src/update/**"
      - ".github/workflows/python-tree-repair.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  e2e:
    name: Repair cycle (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # The target must match the runner: prepare_bundle.sh pip-installs into
        # the tree using that tree's own interpreter, which only runs natively.
        include:
          - os: ubuntu-22.04
            target: linux-x64
          - os: macos-15
            target: macos-arm64
          - os: windows-latest
            target: windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Tauri links against webkit/appindicator on Linux, so even a plain
      # `cargo test` needs these to compile. The action self-gates on Linux, so
      # it is a no-op on the macOS and Windows legs.
      - name: Install Linux dependencies
        uses: ./.github/actions/linux-tauri-deps

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: 1.96.0
          cache-key: python-tree-repair-${{ matrix.os }}

      # `tauri.conf.json` declares `python`, `git` and `ccache` as bundle
      # resources, which the crate expects to exist at build time.
      - name: Stub bundle resource dirs
        uses: ./.github/actions/stub-bundle-dirs

      # The real thing: downloads python-build-standalone, installs esphome and
      # esphome-device-builder into it, and writes the base manifest at the seam
      # between pip and our first install. This is the release path, not a
      # stand-in for it.
      - name: Build a real bundled Python tree
        shell: bash
        run: ./build-scripts/prepare_bundle.sh ${{ matrix.target }}

      - name: Check the manifest was written
        shell: bash
        run: |
          manifest="build/python-${{ matrix.target }}/.base-packages"
          test -f "$manifest" || { echo "::error::no manifest at $manifest"; exit 1; }
          echo "sweep dirs: $(grep -c '^sweep ' "$manifest")"
          echo "base entries: $(grep -c '^keep ' "$manifest")"
          grep -q '/pip$' "$manifest" || { echo "::error::manifest does not name pip"; exit 1; }

      - name: Run the repair cycle
        shell: bash
        working-directory: src-tauri
        env:
          # Absolute: the test runs from src-tauri/, the tree is at the repo root.
          ESPHOME_E2E_PYTHON_TREE: ${{ github.workspace }}/build/python-${{ matrix.target }}
        # --ignored runs exactly the tests that need this tree. Single-threaded
        # because the cycle mutates one shared tree in sequence.
        run: cargo test --all-features -- --ignored --test-threads=1 --nocapture
