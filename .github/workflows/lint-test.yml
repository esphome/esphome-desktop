name: Lint & Test

# Fast Rust checks for the src-tauri crate. The main `Build` workflow only runs
# `cargo tauri build`, which compiles the crate but never executes the unit
# tests, clippy, or rustfmt. This job closes that gap so `#[test]` modules
# actually gate merges instead of silently rotting.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Per-branch concurrency: a new push cancels an in-flight run for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test:
    name: Rust lint & test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Tauri links against the system webkit/appindicator stack on Linux, so
      # even a plain `cargo test` needs these to compile. Same dependency set
      # as the Build workflow's Linux jobs (shared composite action).
      - name: Install Linux dependencies
        uses: ./.github/actions/linux-tauri-deps

      # Pin the toolchain version (unlike the Build workflow, which floats
      # `stable`). clippy and rustfmt are *required* gates below, so a floating
      # toolchain would let a new Rust release introduce a fresh clippy lint or
      # a rustfmt formatting tweak that breaks unrelated PRs through no fault of
      # their own. Pinning makes the gate deterministic; bump it deliberately to
      # adopt newer lints. 1.96.0 is the version that established the green
      # clippy/fmt baseline this workflow enforces.
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
          cache-key: lint-test
          # The rust-cache#341 workaround (the action's default) only matters
          # on macOS; this job has always cached ~/.cargo/bin, so keep doing so.
          cache-bin: "true"

      - name: Stub bundle resource dirs
        uses: ./.github/actions/stub-bundle-dirs

      # Required gates. clippy and rustfmt were introduced as advisory in the
      # first iteration of this workflow because they had never run in CI and the
      # tree had no enforced-clean baseline. Both have since passed clean on the
      # pinned toolchain, so they now block merges — formatting drift and clippy
      # warnings fail the build like any test would.
      - name: Formatting
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Run the unit tests. Failures block the merge.
      - name: Tests
        working-directory: src-tauri
        run: cargo test --all-features --verbose

  # Cross-platform coverage for the Windows/macOS `#[cfg]` branches. The
  # `lint-test` job above only ever lints/tests the Linux compilation: clippy
  # and `cargo test` evaluate code for the *host* target, so every
  # `#[cfg(target_os = "windows")]` / `#[cfg(target_os = "macos")]` block (the
  # Win32 console/process-group code, the macOS app-cleanup and CLT git probe,
  # the platform-specific Python paths, …) is invisible to the required gate.
  # `cargo fmt` is the exception — it formats stripped-out branches regardless
  # of target — so formatting is checked here just like on Linux (advisory on
  # this job).
  #
  # Every step here is ADVISORY: these checks run for the first time on these
  # platforms and have no established green baseline, so a real lint, a Windows
  # newline quirk, or a path-separator assumption in a test would otherwise
  # block unrelated PRs. A failure surfaces as a `::warning::` annotation
  # instead of a red check. This mirrors exactly how the Linux clippy/fmt gates
  # were introduced (advisory first, promoted once green). To promote: drop the
  # `|| echo "::warning::…"` tails and add these checks to branch protection.
  lint-test-cross:
    name: Rust lint & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same pinned toolchain as the Linux job so the advisory clippy/fmt lints
      # match what a maintainer would promote later. No webkit/appindicator
      # deps are needed: Tauri uses the system WebView2 (Windows) / WKWebView
      # (macOS), not the GTK/webkit stack.
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
          cache-key: lint-test-${{ matrix.os }}

      # `tauri.conf.json` declares `python`, `git` and `ccache` at the
      # top-level `bundle` block, so they're resources on macOS/Windows too
      # (git = MinGit, ccache = bundled ccache on Windows).
      - name: Stub bundle resource dirs
        uses: ./.github/actions/stub-bundle-dirs

      # fmt is cfg-agnostic and already green on Linux; advisory here only to
      # guard against a Windows newline quirk on this first run.
      - name: Formatting (advisory)
        working-directory: src-tauri
        shell: bash
        run: cargo fmt --all --check || echo "::warning::cargo fmt --check failed on ${{ matrix.os }} (advisory — not blocking)"

      - name: Clippy (advisory)
        working-directory: src-tauri
        shell: bash
        run: cargo clippy --all-targets --all-features -- -D warnings || echo "::warning::clippy found issues on ${{ matrix.os }} (advisory — not blocking)"

      - name: Tests (advisory)
        working-directory: src-tauri
        shell: bash
        run: cargo test --all-features --verbose || echo "::warning::cargo test failed on ${{ matrix.os }} (advisory — not blocking)"
