name: Lint & Test

# Fast Rust checks for the src-tauri crate. The main `Build` workflow only runs
# `cargo tauri build`, which compiles the crate but never executes the unit
# tests, clippy, or rustfmt. This job closes that gap so `#[test]` modules
# actually gate merges instead of silently rotting.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Per-branch concurrency: a new push cancels an in-flight run for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # On pull requests, skip the Rust lint/test jobs when the PR only touches
  # documentation or repo meta files (see .github/scripts/determine_jobs.py).
  #
  # INVARIANT: these jobs must stay non-required checks. Unlike build.yml there
  # is deliberately no CI Status aggregate here, so a docs-only PR (or a
  # determine-jobs gate-job failure) just skips them with nothing reported. If
  # any of these names is ever made a required check, that silent skip would
  # hang the merge; add a CI Status style aggregate (as build.yml has) first.
  # Non-PR events skip this gate and run the jobs unconditionally.
  determine-jobs:
    name: Determine jobs
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # determine_jobs.py reads the PR's changed files via `gh pr diff`; without
      # pull-requests:read the token is denied, the script fails safe to
      # run-everything, and the docs-only skip silently never happens.
      pull-requests: read
    outputs:
      lint_test: ${{ steps.determine.outputs.lint_test }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Determine jobs
        id: determine
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          output=$(python3 .github/scripts/determine_jobs.py)
          echo "$output" | jq
          echo "lint_test=$(echo "$output" | jq -r '.lint_test')" >> "$GITHUB_OUTPUT"

  lint-test:
    name: Rust lint & test
    needs: determine-jobs
    # Run on a manual dispatch regardless; on a PR, only when code changed.
    # always() is required: determine-jobs is PR-only, so on workflow_dispatch it
    # is skipped, and without a status function the needs edge would skip this
    # job too (GitHub skips a dependent when a needed job is skipped unless its
    # if uses always()/!cancelled()).
    if: always() && (github.event_name != 'pull_request' || needs.determine-jobs.outputs.lint_test == 'true')
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Structural gate: no file under src-tauri/src may cross the line cap.
      # Needs no Rust toolchain, so it runs before the setup steps and fails
      # fast. The rule is in CONTRIBUTING.md ("Code structure policies"); the
      # grandfathered files are listed in the script itself. Runs here rather
      # than in lint-test-cross because it is platform independent and would
      # otherwise report the same result three times.
      - name: File size cap
        run: python3 .github/scripts/check_file_size.py

      # Tauri links against the system webkit/appindicator stack on Linux, so
      # even a plain `cargo test` needs these to compile. Same dependency set
      # as the Build workflow's Linux jobs (shared composite action).
      - name: Install Linux dependencies
        uses: ./.github/actions/linux-tauri-deps

      # Pin the toolchain version (unlike the Build workflow, which floats
      # `stable`). clippy and rustfmt are *required* gates below, so a floating
      # toolchain would let a new Rust release introduce a fresh clippy lint or
      # a rustfmt formatting tweak that breaks unrelated PRs through no fault of
      # their own. Pinning makes the gate deterministic; bump it deliberately to
      # adopt newer lints. 1.96.0 is the version that established the green
      # clippy/fmt baseline this workflow enforces.
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
          cache-key: lint-test
          # The rust-cache#341 workaround (the action's default) only matters
          # on macOS; this job has always cached ~/.cargo/bin, so keep doing so.
          cache-bin: "true"

      - name: Stub bundle resource dirs
        uses: ./.github/actions/stub-bundle-dirs

      # Required gates. clippy and rustfmt were introduced as advisory in the
      # first iteration of this workflow because they had never run in CI and the
      # tree had no enforced-clean baseline. Both have since passed clean on the
      # pinned toolchain, so they now block merges — formatting drift and clippy
      # warnings fail the build like any test would.
      - name: Formatting
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Run the unit tests. Failures block the merge.
      - name: Tests
        working-directory: src-tauri
        run: cargo test --all-features --verbose

  # Cross-platform coverage for the Windows/macOS `#[cfg]` branches. The
  # `lint-test` job above only ever lints/tests the Linux compilation: clippy
  # and `cargo test` evaluate code for the *host* target, so every
  # `#[cfg(target_os = "windows")]` / `#[cfg(target_os = "macos")]` block (the
  # Win32 console/process-group code, the macOS app-cleanup and CLT git probe,
  # the platform-specific Python paths, …) is invisible to the required gate.
  # `cargo fmt` is the exception — it formats stripped-out branches regardless
  # of target — so formatting is checked here just like on Linux.
  #
  # These steps were ADVISORY while they had no established green baseline, on
  # the reasoning that a Windows newline quirk or a path-separator assumption
  # shouldn't block unrelated PRs. That baseline now exists, and the advisory
  # tails cost more than they saved: clippy failed on windows-latest from the
  # day this job landed and the job reported success the whole time, so the
  # Windows-only code — which is exactly what this job exists to cover, and
  # which the required Linux gate can never see — was never linted at all. A
  # check that is green whether or not it passes is worse than no check, because
  # it reads as coverage. See #325.
  #
  # So they now fail the job. Note that a red check only *blocks a merge* if it
  # is also a required check in branch protection; that is a repo setting, not
  # something this file can do.
  lint-test-cross:
    name: Rust lint & test (${{ matrix.os }})
    needs: determine-jobs
    # Run on a manual dispatch regardless; on a PR, only when code changed.
    # always() is required (see the note on the lint-test job above): without it,
    # the skipped PR-only determine-jobs would skip this job on workflow_dispatch.
    if: always() && (github.event_name != 'pull_request' || needs.determine-jobs.outputs.lint_test == 'true')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same pinned toolchain as the Linux job, so a lint is a lint regardless
      # of which job caught it. No webkit/appindicator deps are needed: Tauri
      # uses the system WebView2 (Windows) / WKWebView (macOS), not the
      # GTK/webkit stack.
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
          cache-key: lint-test-${{ matrix.os }}

      # `tauri.conf.json` declares `python`, `git` and `ccache` at the
      # top-level `bundle` block, so they're resources on macOS/Windows too
      # (git = MinGit, ccache = bundled ccache on Windows).
      - name: Stub bundle resource dirs
        uses: ./.github/actions/stub-bundle-dirs

      # fmt is cfg-agnostic and already green on Linux, so this is belt and
      # braces against a platform newline quirk rather than a real second check.
      - name: Formatting
        working-directory: src-tauri
        shell: bash
        run: cargo fmt --all --check

      # The whole point of this job: the required Linux gate only ever
      # evaluates the host cfg, so this is the only thing that lints the
      # `#[cfg(target_os = "windows")]` / `#[cfg(target_os = "macos")]` code.
      - name: Clippy
        working-directory: src-tauri
        shell: bash
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Same reasoning as clippy: the platform-gated tests (e.g. the Windows
      # job-object test) only ever run here, so an advisory tail would mean a
      # green check proving nothing about the code it is meant to cover.
      - name: Tests
        working-directory: src-tauri
        shell: bash
        run: cargo test --all-features --verbose
